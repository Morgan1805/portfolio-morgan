      overflow-x: hidden;

      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
    }

      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(12px);
    }
    .nav-logo {

      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-badge {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;

      overflow: hidden;

      pointer-events: none;
      letter-spacing: 10px;
    }
